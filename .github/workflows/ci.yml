name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true

  quality-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: Forge-Space/forge-tenant-profiles
          path: .forge-tenant-profiles
          token: ${{ secrets.FORGE_TENANT_PROFILES_READ_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Validate tenant context
        shell: bash
        env:
          FORGE_TENANT_ID: ${{ vars.FORGE_TENANT_ID }}
          FORGE_TENANT_PROFILE_REF: ${{ vars.FORGE_TENANT_PROFILE_REF }}
        run: |
          if [[ -z "${FORGE_TENANT_ID}" ]]; then
            echo "::error::Missing required repo variable FORGE_TENANT_ID."
            exit 1
          fi
          if [[ -z "${FORGE_TENANT_PROFILE_REF}" ]]; then
            echo "::error::Missing required repo variable FORGE_TENANT_PROFILE_REF."
            exit 1
          fi
          if [[ ! -f "${FORGE_TENANT_PROFILE_REF}" ]]; then
            echo "::error::Tenant profile not found at ${FORGE_TENANT_PROFILE_REF}."
            exit 1
          fi
      - uses: Forge-Space/forge-ai-action@1db6524858b544cb8051a4510e835d67818b24a2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: diff
          threshold: 60
          tenant: ${{ vars.FORGE_TENANT_ID }}
          tenant_profile_ref: ${{ vars.FORGE_TENANT_PROFILE_REF }}
